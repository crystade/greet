# Docker Compose for greet integration tests.
# Start with:  docker compose -f docker-compose.test.yml up -d --wait
# Stop with:   docker compose -f docker-compose.test.yml down -v
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  sshd:
    image: linuxserver/openssh-server:latest
    environment:
      PUID: "1000"
      PGID: "1000"
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
    ports:
      - "2222:2222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222"]
      interval: 2s
      timeout: 5s
      retries: 15

  minecraft:
    image: itzg/minecraft-server:latest
    environment:
      EULA: "TRUE"
      TYPE: VANILLA
      ONLINE_MODE: "false"
      MEMORY: 512M
    ports:
      - "25565:25565"
    healthcheck:
      test: ["CMD-SHELL", "mc-health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
